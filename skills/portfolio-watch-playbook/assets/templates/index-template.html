<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://alva-ai-static.b-cdn.net/design-system/v1/design-system.css" />
    <script src="https://unpkg.com/@alva-ai/toolkit/dist/browser.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
      html {
        height: 100%;
        overflow: hidden;
      }
      body {
        height: 100%;
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
        background: var(--b0-page);
        color: var(--text-n9);
      }
      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }
      button,
      input {
        font: inherit;
      }
      .playbook-container {
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        padding: var(--spacing-s) var(--spacing-xxl) var(--spacing-xxxxl);
      }
      .status-strip,
      .pill-row,
      .control-row,
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--spacing-xs);
      }
      .status-strip {
        margin-bottom: var(--spacing-m);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        max-width: 100%;
        min-height: 24px;
        padding: var(--spacing-xxxs) var(--spacing-xs);
        border-radius: var(--radius-ct-s);
        background: var(--grey-g01);
        color: var(--text-n7);
        font-size: 12px;
        line-height: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: var(--spacing-xl);
        align-items: stretch;
      }
      .col-3 { grid-column: span 3; }
      .col-4 { grid-column: span 4; }
      .col-6 { grid-column: span 6; }
      .col-8 { grid-column: span 8; }
      .col-12 { grid-column: span 12; }
      .panel {
        min-width: 0;
      }
      .section-title {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: var(--spacing-m);
        margin-bottom: var(--spacing-m);
      }
      .section-title-text {
        font-size: 16px;
        line-height: 26px;
        font-weight: 400;
        color: var(--text-n9);
      }
      .section-meta {
        font-size: 12px;
        line-height: 20px;
        color: var(--text-n5);
        white-space: nowrap;
      }
      .visual-stage {
        display: grid;
        grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
        gap: var(--spacing-xl);
        align-items: start;
        margin-bottom: var(--spacing-xxl);
        max-width: 100%;
      }
      .chart-panel {
        min-width: 0;
        max-width: 100%;
      }
      .chart-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        justify-content: space-between;
        gap: var(--spacing-s);
        padding: var(--spacing-xs);
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
        background: var(--grey-g01);
        margin-bottom: var(--spacing-m);
        max-width: 100%;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        min-width: 0;
        max-width: 100%;
      }
      .benchmark-group {
        margin-left: auto;
      }
      .control-label {
        flex: 0 0 auto;
        font-size: 11px;
        line-height: 18px;
        color: var(--text-n5);
      }
      .segmented {
        display: inline-flex;
        align-items: center;
        padding: 3px;
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
        gap: 2px;
      }
      .segment {
        border: 0;
        border-radius: var(--radius-ct-s);
        background: transparent;
        color: var(--text-n7);
        cursor: pointer;
        min-width: 0;
      }
      .segment {
        min-height: 30px;
        padding: 0 var(--spacing-m);
        font-size: 13px;
        line-height: 20px;
      }
      .segment.is-active {
        background: var(--main-m1);
        color: var(--b0-page);
      }
      .segment:focus-visible,
      .decision-action:focus-visible,
      .checkbox-pill input:focus-visible {
        outline: 2px solid var(--main-m1);
        outline-offset: 2px;
      }
      .checkbox-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        max-width: 100%;
        min-height: 28px;
        padding: 0 var(--spacing-xs);
        border-radius: var(--radius-ct-s);
        border: 1px solid transparent;
        background: var(--b0-page);
        color: var(--text-n7);
        font-size: 12px;
        line-height: 20px;
        cursor: pointer;
      }
      .checkbox-pill.is-active {
        border-color: var(--line-l9);
        color: var(--text-n9);
      }
      .checkbox-pill input {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: var(--main-m1);
      }
      .chart-shell {
        min-height: 420px;
        padding: var(--spacing-s) 0 0;
      }
      .trend-chart-container {
        width: 100%;
        height: 400px;
      }
      .attention-panel {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-m);
        min-width: 0;
      }
      .attention-card {
        min-width: 0;
        max-width: 100%;
        padding: var(--spacing-l);
        background: var(--grey-g01);
        border-radius: var(--radius-ct-s);
      }
      .attention-kicker {
        font-size: 12px;
        line-height: 20px;
        color: var(--text-n7);
      }
      .attention-question {
        margin-top: var(--spacing-xxs);
        font-size: 24px;
        line-height: 32px;
        font-weight: 400;
        color: var(--text-n9);
        overflow-wrap: anywhere;
      }
      .attention-status-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--spacing-m);
        margin-top: var(--spacing-l);
      }
      .attention-status-row > * {
        min-width: 0;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: var(--spacing-xxxs) var(--spacing-xs);
        border-radius: var(--radius-ct-min);
        font-size: 11px;
        line-height: 16px;
        text-transform: uppercase;
        background: var(--line-l05);
        color: var(--text-n7);
      }
      .status-badge.green {
        color: var(--main-m3);
      }
      .status-badge.yellow {
        color: var(--main-m1);
      }
      .status-badge.red {
        color: var(--main-m4);
      }
      .overall-status {
        min-width: 0;
      }
      .overall-label {
        font-size: 18px;
        line-height: 28px;
        color: var(--text-n9);
      }
      .overall-subtitle,
      .why-text,
      .next-watch-text {
        margin-top: var(--spacing-xs);
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n7);
        overflow-wrap: anywhere;
      }
      .answer-list {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-xs);
        margin-top: var(--spacing-s);
      }
      .answer-heading {
        margin-top: var(--spacing-l);
      }
      .answer-row {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        gap: var(--spacing-s);
        align-items: start;
        padding-top: var(--spacing-xs);
        border-top: 1px solid var(--line-l03);
      }
      .answer-row > * {
        min-width: 0;
      }
      .answer-symbol {
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n9);
      }
      .answer-state {
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n9);
        overflow-wrap: anywhere;
      }
      .answer-detail {
        margin-top: 2px;
        font-size: 12px;
        line-height: 18px;
        color: var(--text-n5);
        overflow-wrap: anywhere;
      }
      .attention-meta-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--spacing-m);
        margin-top: var(--spacing-l);
      }
      .attention-meta-label {
        font-size: 11px;
        line-height: 18px;
        color: var(--text-n5);
      }
      .summary-block,
      .ping-block,
      .empty-block,
      .signal-card,
      .detail-card,
      .alert-card,
      .watch-table-surface {
        background: var(--grey-g01);
        border-radius: var(--radius-ct-s);
      }
      .summary-block,
      .ping-block,
      .empty-block {
        padding: var(--spacing-l);
      }
      .empty-block {
        grid-column: 1 / -1;
      }
      .metric-label,
      .small-label {
        font-size: 12px;
        line-height: 20px;
        color: var(--text-n7);
      }
      .metric-value {
        margin-top: var(--spacing-xxs);
        font-size: 30px;
        line-height: 38px;
        font-weight: 400;
        color: var(--text-n9);
      }
      .metric-caption,
      .detail-text,
      .signal-reason,
      .tech-summary {
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n7);
        overflow-wrap: anywhere;
      }
      .metric-caption {
        margin-top: var(--spacing-xxs);
      }
      .ping-title {
        margin-top: var(--spacing-xxs);
        font-size: 18px;
        line-height: 28px;
        font-weight: 400;
        color: var(--text-n9);
      }
      .ping-body {
        margin-top: var(--spacing-xs);
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n7);
      }
      .decision-action {
        margin-top: var(--spacing-m);
        border: 0;
        background: transparent;
        color: var(--main-m1);
        font-size: 13px;
        line-height: 21px;
        padding: 0;
        cursor: pointer;
      }
      .is-up { color: var(--main-m3); }
      .is-down { color: var(--main-m4); }
      .is-neutral { color: var(--text-n9); }
      .signal-list,
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--spacing-m);
      }
      .signal-card,
      .detail-card,
      .alert-card {
        min-width: 0;
        padding: var(--spacing-m);
        color: inherit;
        text-decoration: none;
      }
      .signal-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--spacing-xs);
        margin-bottom: var(--spacing-xs);
      }
      .signal-symbol {
        font-size: 13px;
        line-height: 20px;
        color: var(--text-n7);
      }
      .severity {
        display: inline-flex;
        align-items: center;
        min-height: 20px;
        padding: 0 7px;
        border-radius: var(--radius-ct-min);
        font-size: 11px;
        line-height: 16px;
        text-transform: uppercase;
        background: var(--line-l05);
        color: var(--text-n7);
      }
      .severity.high {
        color: var(--main-m4);
      }
      .severity.medium {
        color: var(--main-m1);
      }
      .signal-title {
        font-size: 15px;
        line-height: 24px;
        color: var(--text-n9);
        margin-bottom: var(--spacing-xxs);
      }
      .tech-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: var(--spacing-xs) 0;
      }
      .tech-chip {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 var(--spacing-xs);
        border-radius: var(--radius-ct-min);
        background: var(--b0-page);
        color: var(--text-n7);
        font-size: 11px;
        line-height: 16px;
        white-space: nowrap;
      }
      .tech-chip-label {
        color: var(--text-n5);
        margin-right: 4px;
      }
      .tech-summary {
        margin-top: var(--spacing-xs);
      }
      .watch-table-surface {
        overflow-x: auto;
      }
      .watch-table-row {
        display: flex;
        gap: var(--spacing-m);
        padding: 0 var(--spacing-m);
        min-height: 40px;
        align-items: center;
      }
      .table-header {
        color: var(--text-n5);
        font-size: 12px;
        line-height: 20px;
      }
      .table-body-row {
        color: var(--text-n8);
        font-size: 13px;
        line-height: 21px;
        border-top: 1px solid var(--line-l03);
      }
      .watch-table-cell {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .watch-table-cell.is-technical {
        min-width: 260px;
        max-width: 420px;
        white-space: normal;
        overflow: visible;
      }
      .tech-cell-title {
        color: var(--text-n9);
        line-height: 21px;
      }
      .tech-cell-sub {
        margin-top: 2px;
        color: var(--text-n5);
        font-size: 12px;
        line-height: 18px;
      }
      .ticker-controls {
        margin-top: var(--spacing-s);
      }
      .error-box {
        display: none;
        margin-bottom: var(--spacing-m);
        padding: var(--spacing-m);
        border-radius: var(--radius-ct-s);
        background: var(--grey-g01);
        color: var(--main-m4);
        font-size: 13px;
        line-height: 21px;
      }
      @media (max-width: 980px) {
        .playbook-container {
          padding: var(--spacing-s) var(--spacing-l) var(--spacing-xxxl);
        }
        .status-strip {
          display: none;
        }
        .grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: var(--spacing-l);
        }
        .col-3,
        .col-4,
        .col-6,
        .col-8,
        .col-12 {
          grid-column: span 4;
        }
        .visual-stage {
          grid-template-columns: 1fr;
        }
        .attention-question {
          font-size: 20px;
          line-height: 28px;
        }
        .attention-status-row {
          flex-direction: column;
          gap: var(--spacing-s);
        }
        .chart-toolbar {
          display: grid;
          grid-template-columns: 1fr;
          justify-content: flex-start;
        }
        .control-group,
        .segmented {
          flex-wrap: wrap;
        }
        .control-group {
          width: 100%;
        }
        .segmented {
          max-width: 100%;
        }
        .segment {
          min-width: 0;
        }
        .benchmark-group {
          margin-left: 0;
        }
        .trend-chart-container {
          height: 360px;
        }
        .chart-shell {
          min-height: 380px;
        }
        .signal-list,
        .detail-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 520px) {
        .playbook-container {
          padding: var(--spacing-s) var(--spacing-s) var(--spacing-xxxl);
        }
        .attention-card {
          padding: var(--spacing-m);
        }
        .answer-row {
          grid-template-columns: 52px minmax(0, 1fr);
          gap: var(--spacing-xs);
        }
        .control-group {
          align-items: flex-start;
          flex-direction: column;
        }
        .segmented,
        .control-row {
          width: 100%;
        }
        .segmented {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(68px, 1fr));
        }
        .segment {
          flex: 1 1 64px;
          padding: 0 var(--spacing-s);
        }
        .checkbox-pill {
          flex: 1 1 88px;
          justify-content: center;
        }
        .chart-toolbar {
          overflow: hidden;
        }
      }
    </style>
  </head>
  <body>
    <main class="playbook-container">
      <div class="status-strip" id="statusStrip">
        <span class="pill">Loading feed data</span>
      </div>
      <div class="error-box" id="errorBox"></div>

      <section class="visual-stage" aria-label="Portfolio attention status">
        <aside class="attention-panel" aria-label="Portfolio Attention Status">
          <div class="attention-card">
            <div class="attention-kicker">Portfolio Attention Status</div>
            <h1 class="attention-question">Do you need to review anything now?</h1>

            <div class="attention-status-row">
              <div class="overall-status">
                <div class="attention-meta-label">Overall status</div>
                <div class="overall-label" id="overallStatus">...</div>
                <div class="overall-subtitle" id="overallSubtitle">...</div>
              </div>
              <span class="status-badge" id="overallBadge">...</span>
            </div>

            <div class="attention-meta-label answer-heading">Today’s answer</div>
            <div class="answer-list" id="todayAnswers"></div>

            <div class="attention-meta-grid">
              <div>
                <div class="attention-meta-label">Why</div>
                <div class="why-text" id="attentionWhy">...</div>
              </div>
              <div>
                <div class="attention-meta-label">Last checked</div>
                <div class="why-text" id="lastChecked">...</div>
              </div>
              <div>
                <div class="attention-meta-label">Next watch</div>
                <div class="next-watch-text" id="nextWatch">...</div>
              </div>
            </div>
          </div>
        </aside>

        <div class="chart-panel">
          <div class="chart-toolbar" aria-label="Trend chart controls">
            <div class="control-group">
              <span class="control-label">View</span>
              <div class="segmented" id="modeTabs" aria-label="Chart mode"></div>
            </div>
            <div class="control-group">
              <span class="control-label">Range</span>
              <div class="segmented" id="rangeTabs" aria-label="Chart range"></div>
            </div>
            <div class="control-group benchmark-group">
              <span class="control-label">Benchmark</span>
              <div class="control-row" id="benchmarkControls" aria-label="Benchmark controls"></div>
            </div>
          </div>
          <div class="chart-shell">
            <div id="trendChart" class="trend-chart-container"></div>
          </div>
          <div class="ticker-controls">
            <div class="chip-row" id="tickerControls" aria-label="Ticker controls"></div>
          </div>
        </div>
      </section>

      <section class="grid" aria-label="Portfolio watch details">
        <div class="panel col-12" id="signals">
          <div class="section-title">
            <span class="section-title-text">What matters now</span>
            <span class="section-meta" id="signalStamp"></span>
          </div>
          <div class="signal-list" id="signalList"></div>
        </div>

        <div class="panel col-12">
          <div class="section-title">
            <span class="section-title-text">Holdings state</span>
            <span class="section-meta" id="tableStamp"></span>
          </div>
          <div class="watch-table-surface" id="assetTable"></div>
        </div>

        <div class="panel col-6">
          <div class="section-title"><span class="section-title-text">Signal detail</span></div>
          <div class="detail-grid" id="signalDetails"></div>
        </div>

        <div class="panel col-6">
          <div class="section-title"><span class="section-title-text">Alert history</span></div>
          <div class="detail-grid" id="alertHistory"></div>
        </div>
      </section>
    </main>

    <script>
      const OWNER_USERNAME = "REPLACE_OWNER_USERNAME";
      const FEED_NAME = "REPLACE_FEED_NAME";
      const FEED_MAJOR = "v1";
      function feedPath(group, output, suffix) {
        return `/alva/home/${OWNER_USERNAME}/feeds/${FEED_NAME}/${FEED_MAJOR}/data/${group}/${output}/${suffix}`;
      }
      const PATHS = {
        summary: feedPath("portfolio", "summary", "@last/1"),
        assets: feedPath("watch", "assets", "@last/1"),
        chartSeries: feedPath("chart", "series", "@last/260"),
        signals: feedPath("signals", "events", "@last/1"),
        alerts: feedPath("alerts", "events", "@last/5"),
        decision: feedPath("alerts", "decision", "@last/1"),
      };
      const PALETTE = ["#2f8f9d", "#d96b5f", "#5e72c8", "#78994e", "#b565a7", "#c48c3f", "#60798d"];
      const FONT = "'Delight', -apple-system, 'OPPO Sans 4.0', BlinkMacSystemFont, sans-serif";
      const MODES = [
        { key: "portfolio", label: "Portfolio" },
        { key: "tickers", label: "Tickers" },
        { key: "compare", label: "Compare" },
      ];
      const RANGES = [
        { key: "1m", label: "1M", months: 1 },
        { key: "3m", label: "3M", months: 3 },
        { key: "6m", label: "6M", months: 6 },
        { key: "all", label: "All", months: null },
      ];
      const state = {
        mode: "portfolio",
        range: "3m",
        benchmarks: new Set(),
        benchmarkDefaultsApplied: false,
        selectedTicker: "",
        comparedTickers: new Set(),
      };
      let trendChart = null;
      let allChartRows = [];
      let allAssets = [];
      let allSignals = [];

      function createAlvaClientConfig() {
        const params = new URLSearchParams(window.location.search);
        const pbsvToken = window.alva?.udf?.getViewerToken?.();
        const apiOrigin = params.get("api_origin");
        return {
          ...(pbsvToken ? { pbsvToken } : {}),
          ...(apiOrigin ? { baseUrl: apiOrigin.replace(/\/$/, "") } : {}),
        };
      }
      function createAlvaClient() {
        return new AlvaToolkit.AlvaClient(createAlvaClientConfig());
      }
      async function readAlfsJson(path) {
        const value = await createAlvaClient().fs.read({ path });
        if (typeof value === "string") return JSON.parse(value);
        return value;
      }
      function flattenRows(rows) {
        if (!Array.isArray(rows)) return [];
        const out = [];
        rows.forEach((row) => {
          if (Array.isArray(row.items)) {
            row.items.forEach((item) => out.push({ ...item, date: item.date || row.date }));
          } else {
            out.push(row);
          }
        });
        return out;
      }
      function last(rows) {
        return rows.length ? rows[rows.length - 1] : null;
      }
      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      function clsFor(value) {
        if (typeof value !== "number") return "is-neutral";
        if (value > 0) return "is-up";
        if (value < 0) return "is-down";
        return "is-neutral";
      }
      function fmtNumber(value, digits) {

      function initTableAlignment(tableEl) {

        rows.forEach((row) => {

        const colWidths = [];
        for (let col = 0; col < colCount; col += 1) {
          let maxW = 0;
          rows.forEach((row) => {
            const cellEl = row.querySelectorAll(".watch-table-cell")[col];
            if (cellEl) maxW = Math.max(maxW, cellEl.scrollWidth);
          });
          colWidths.push(maxW);
        }
        const totalContent = colWidths.reduce((sum, width) => sum + width, 0);
        const gapTotal = (colCount - 1) * 16;
        const available = tableEl.clientWidth - gapTotal;
        const resolved = colWidths.map((width) => Math.max(width, Math.round((width / totalContent) * available)));
        let totalWidth = gapTotal;
        for (let col = 0; col < colCount; col += 1) {
          totalWidth += resolved[col];
          rows.forEach((row) => {
            const cellEl = row.querySelectorAll(".watch-table-cell")[col];
            if (cellEl) cellEl.style.flex = "0 0 " + resolved[col] + "px";
          });

          row.style.minWidth = totalWidth + "px";
        });
