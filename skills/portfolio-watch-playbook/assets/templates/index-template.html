<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://alva-ai-static.b-cdn.net/design-system/v1/design-system.css" />
    <script src="https://unpkg.com/@alva-ai/toolkit/dist/browser.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
      html {
        height: 100%;
        overflow: hidden;
      }
      body {
        height: 100%;
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
        background: #f7f8f5;
        color: var(--text-n9);
      }
      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }
      button,
      input {
        font: inherit;
      }
      .playbook-container {
        width: 100%;
        max-width: 1240px;
        margin: 0 auto;
        padding: var(--spacing-l) clamp(var(--spacing-s), 3vw, var(--spacing-xxl)) var(--spacing-xxxxl);
      }
      .intro-strip {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: var(--spacing-xl);
        margin-bottom: var(--spacing-l);
      }
      .intro-copy {
        max-width: 780px;
      }
      .intro-kicker {
        font-size: 12px;
        line-height: 20px;
        color: var(--text-n5);
      }
      .intro-title {
        margin: var(--spacing-xxs) 0 0;
        font-size: 18px;
        line-height: 28px;
        font-weight: 400;
        color: var(--text-n9);
      }
      .intro-text {
        margin: var(--spacing-xs) 0 0;
        font-size: 13px;
        line-height: 22px;
        color: var(--text-n7);
      }
      .status-strip,
      .pill-row,
      .control-row,
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--spacing-xs);
      }
      .status-strip {
        margin-bottom: var(--spacing-m);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        max-width: 100%;
        min-height: 24px;
        padding: var(--spacing-xxxs) var(--spacing-xs);
        border-radius: var(--radius-ct-s);
        background: var(--grey-g01);
        color: var(--text-n7);
        font-size: 12px;
        line-height: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: var(--spacing-xl);
        align-items: stretch;
      }
      .col-3 { grid-column: span 3; }
      .col-4 { grid-column: span 4; }
      .col-6 { grid-column: span 6; }
      .col-8 { grid-column: span 8; }
      .col-12 { grid-column: span 12; }
      .panel {
        min-width: 0;
      }
      .section-title {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: var(--spacing-m);
        margin-bottom: var(--spacing-m);
      }
      .section-title-text {
        font-size: 16px;
        line-height: 26px;
        font-weight: 400;
        color: var(--text-n9);
      }
      .section-meta {
        font-size: 12px;
        line-height: 20px;
        color: var(--text-n5);
        white-space: nowrap;
      }
      .notification-title {
        align-items: center;
      }
      .notification-check-button {
        flex: 0 0 auto;
        min-height: 30px;
        padding: 0 var(--spacing-s);
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
        color: var(--text-n8);
        font-size: 12px;
        line-height: 20px;
        cursor: pointer;
      }
      .notification-check-button:hover {
        border-color: var(--line-l9);
        color: var(--text-n9);
      }
      .notification-check-button:disabled {
        cursor: wait;
        color: var(--text-n5);
      }
      .visual-stage {
        display: block;
        margin-bottom: var(--spacing-xl);
        max-width: 100%;
      }
      .chart-panel {
        min-width: 0;
        max-width: 100%;
        margin-bottom: var(--spacing-xxl);
      }
      .chart-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        justify-content: space-between;
        gap: var(--spacing-s);
        padding: var(--spacing-xs);
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
        margin-bottom: var(--spacing-m);
        max-width: 100%;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        min-width: 0;
        max-width: 100%;
      }
      .benchmark-group {
        margin-left: auto;
      }
      .control-label {
        flex: 0 0 auto;
        font-size: 11px;
        line-height: 18px;
        color: var(--text-n5);
      }
      .segmented {
        display: inline-flex;
        align-items: center;
        padding: 3px;
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
        gap: 2px;
      }
      .segment {
        border: 0;
        border-radius: var(--radius-ct-s);
        background: transparent;
        color: var(--text-n7);
        cursor: pointer;
        min-width: 0;
      }
      .segment {
        min-height: 30px;
        padding: 0 var(--spacing-m);
        font-size: 13px;
        line-height: 20px;
      }
      .segment.is-active {
        background: var(--main-m1);
        color: var(--b0-page);
      }
      .segment:focus-visible,
      .decision-action:focus-visible,
      .notification-check-button:focus-visible,
      .checkbox-pill input:focus-visible {
        outline: 2px solid var(--main-m1);
        outline-offset: 2px;
      }
      .checkbox-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        max-width: 100%;
        min-height: 28px;
        padding: 0 var(--spacing-xs);
        border-radius: var(--radius-ct-s);
        border: 1px solid transparent;
        background: var(--b0-page);
        color: var(--text-n7);
        font-size: 12px;
        line-height: 20px;
        cursor: pointer;
      }
      .checkbox-pill.is-active {
        border-color: var(--line-l9);
        color: var(--text-n9);
      }
      .checkbox-pill input {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: var(--main-m1);
      }
      .chart-shell {
        min-height: 420px;
        padding: var(--spacing-s) 0 0;
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
      }
      .trend-chart-container {
        width: 100%;
        height: 400px;
      }
      .attention-card {
        min-width: 0;
        max-width: 100%;
        padding: clamp(var(--spacing-l), 4vw, var(--spacing-xxxl));
        background: var(--b0-page);
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
      }
      .attention-header {
        display: block;
      }
      .attention-title {
        margin-top: var(--spacing-xxs);
        max-width: 960px;
        font-size: clamp(44px, 7vw, 76px);
        line-height: 0.98;
        font-weight: 400;
        color: var(--text-n9);
        overflow-wrap: anywhere;
      }
      .attention-summary {
        max-width: 920px;
        margin-top: var(--spacing-m);
        font-size: clamp(18px, 2.2vw, 24px);
        line-height: 1.3;
        font-weight: 400;
        color: var(--text-n9);
        overflow-wrap: anywhere;
      }
      .attention-lede {
        max-width: 760px;
        margin-top: var(--spacing-m);
        font-size: 15px;
        line-height: 25px;
        color: var(--text-n8);
      }
      .narrative-source {
        margin-top: var(--spacing-xs);
        font-size: 12px;
        line-height: 20px;
        color: var(--text-n5);
      }
      .attention-status-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--spacing-m);
        margin-top: var(--spacing-l);
      }
      .attention-status-row > * {
        min-width: 0;
      }
      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 24px;
        padding: var(--spacing-xxxs) var(--spacing-s);
        border-radius: var(--radius-ct-min);
        font-size: 11px;
        line-height: 16px;
        background: var(--line-l05);
        color: var(--text-n7);
      }
      .status-chip::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: currentColor;
      }
      .status-chip.green {
        color: #197245;
        background: #e8f5ee;
      }
      .status-chip.yellow {
        color: #8a6400;
        background: #fff3cf;
      }
      .status-chip.red {
        color: #a83b32;
        background: #fde8e5;
      }
      .overall-status {
        min-width: 0;
      }
      .overall-label {
        font-size: 18px;
        line-height: 28px;
        color: var(--text-n9);
      }
      .overall-subtitle,
      .why-text,
      .next-watch-text {
        margin-top: var(--spacing-xs);
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n7);
        overflow-wrap: anywhere;
      }
      .answer-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--spacing-s);
        margin-top: var(--spacing-l);
      }
      .answer-heading {
        margin-top: var(--spacing-l);
      }
      .answer-row {
        display: block;
        min-width: 0;
        padding: var(--spacing-m);
        border: 1px solid var(--line-l05);
        border-left: 4px solid var(--line-l3);
        border-radius: var(--radius-ct-s);
        background: var(--grey-g01);
      }
      .answer-row > * {
        min-width: 0;
      }
      .answer-row.green { border-left-color: #2a8a55; }
      .answer-row.yellow { border-left-color: #c89113; }
      .answer-row.red { border-left-color: #c24a40; }
      .answer-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--spacing-s);
      }
      .answer-symbol {
        font-size: 15px;
        line-height: 24px;
        color: var(--text-n9);
      }
      .answer-detail {
        margin-top: var(--spacing-xs);
        font-size: 12px;
        line-height: 19px;
        color: var(--text-n5);
        overflow-wrap: anywhere;
      }
      .answer-context {
        margin-top: var(--spacing-xs);
        padding-top: var(--spacing-xs);
        border-top: 1px solid var(--line-l05);
        font-size: 12px;
        line-height: 19px;
        color: var(--text-n7);
        overflow-wrap: anywhere;
      }
      .mini-metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-top: var(--spacing-s);
      }
      .mini-metric {
        min-width: 0;
      }
      .mini-label {
        font-size: 10px;
        line-height: 15px;
        color: var(--text-n5);
      }
      .mini-value {
        font-size: 13px;
        line-height: 20px;
        color: var(--text-n9);
      }
      .attention-meta-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--spacing-m);
        margin-top: var(--spacing-l);
      }
      .attention-meta-label {
        font-size: 11px;
        line-height: 18px;
        color: var(--text-n5);
      }
      .summary-block,
      .ping-block,
      .empty-block,
      .signal-card,
      .detail-card,
      .alert-card {
        background: var(--b0-page);
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
      }
      .summary-block,
      .ping-block,
      .empty-block {
        padding: var(--spacing-l);
      }
      .empty-block {
        grid-column: 1 / -1;
      }
      .metric-label,
      .small-label {
        font-size: 12px;
        line-height: 20px;
        color: var(--text-n7);
      }
      .metric-value {
        margin-top: var(--spacing-xxs);
        font-size: 30px;
        line-height: 38px;
        font-weight: 400;
        color: var(--text-n9);
      }
      .metric-caption,
      .detail-text,
      .signal-reason,
      .tech-summary {
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n7);
        overflow-wrap: anywhere;
      }
      .metric-caption {
        margin-top: var(--spacing-xxs);
      }
      .ping-title {
        margin-top: var(--spacing-xxs);
        font-size: 18px;
        line-height: 28px;
        font-weight: 400;
        color: var(--text-n9);
      }
      .ping-body {
        margin-top: var(--spacing-xs);
        font-size: 13px;
        line-height: 21px;
        color: var(--text-n7);
      }
      .decision-action {
        margin-top: var(--spacing-m);
        border: 0;
        background: transparent;
        color: var(--main-m1);
        font-size: 13px;
        line-height: 21px;
        padding: 0;
        cursor: pointer;
      }
      .is-up { color: var(--main-m3); }
      .is-down { color: var(--main-m4); }
      .is-watch { color: var(--main-m1); }
      .is-neutral { color: var(--text-n9); }
      .signal-list,
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--spacing-m);
      }
      .panel.is-narrow .detail-grid {
        grid-template-columns: 1fr;
      }
      .signal-card,
      .detail-card,
      .alert-card {
        min-width: 0;
        padding: var(--spacing-m);
        color: inherit;
        text-decoration: none;
      }
      .notification-rule {
        margin-top: var(--spacing-s);
        padding-top: var(--spacing-s);
        border-top: 1px solid var(--line-l05);
      }
      .notification-current {
        margin-bottom: var(--spacing-s);
      }
      .notification-history-title {
        margin: var(--spacing-m) 0 var(--spacing-xs);
        font-size: 12px;
        line-height: 18px;
        font-weight: 500;
        color: var(--text-n7);
      }
      .notification-history-list {
        display: grid;
        gap: var(--spacing-xs);
      }
      .notification-history-item {
        padding: var(--spacing-s);
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
      }
      .notification-history-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--spacing-s);
        margin-bottom: var(--spacing-xxs);
      }
      .notification-type {
        font-size: 12px;
        line-height: 18px;
        font-weight: 500;
        color: var(--text-n9);
      }
      .notification-time {
        flex: 0 0 auto;
        font-size: 12px;
        line-height: 18px;
        color: var(--text-n5);
      }
      .notification-empty {
        padding: var(--spacing-s);
        border: 1px dashed var(--line-l05);
        border-radius: var(--radius-ct-s);
        color: var(--text-n6);
        font-size: 12px;
        line-height: 20px;
      }
      .notification-helper {
        margin-bottom: var(--spacing-s);
        padding: var(--spacing-s);
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
        color: var(--text-n7);
        font-size: 12px;
        line-height: 20px;
      }
      .notification-helper[hidden] {
        display: none;
      }
      .notification-helper.is-ok {
        border-color: rgba(47, 143, 116, 0.36);
        color: var(--main-m3);
      }
      .notification-helper.is-error {
        border-color: rgba(217, 107, 95, 0.42);
        color: var(--main-m4);
      }
      .signal-card {
        transition: border-color 160ms ease, transform 160ms ease;
      }
      .signal-card:hover {
        border-color: var(--line-l9);
        transform: translateY(-1px);
      }
      .signal-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--spacing-xs);
        margin-bottom: var(--spacing-xs);
      }
      .signal-symbol {
        font-size: 13px;
        line-height: 20px;
        color: var(--text-n7);
      }
      .signal-title {
        font-size: 15px;
        line-height: 24px;
        color: var(--text-n9);
        margin-bottom: var(--spacing-xxs);
      }
      .tech-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: var(--spacing-xs) 0;
      }
      .tech-chip {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 var(--spacing-xs);
        border-radius: var(--radius-ct-min);
        background: var(--b0-page);
        color: var(--text-n7);
        font-size: 11px;
        line-height: 16px;
        white-space: nowrap;
      }
      .tech-chip-label {
        color: var(--text-n5);
        margin-right: 4px;
      }
      .tech-summary {
        margin-top: var(--spacing-xs);
      }
      .evidence-pair {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: var(--spacing-s);
        margin-top: var(--spacing-xs);
      }
      .evidence-box {
        min-width: 0;
        padding: var(--spacing-s);
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
      }
      .evidence-label {
        font-size: 11px;
        line-height: 18px;
        color: var(--text-n5);
        margin-bottom: 2px;
      }
      .evidence-table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--line-l05);
        border-radius: var(--radius-ct-s);
        background: var(--b0-page);
      }
      .evidence-table {
        width: 100%;
        min-width: 1100px;
        border-collapse: collapse;
      }
      .evidence-table th,
      .evidence-table td {
        padding: var(--spacing-s) var(--spacing-m);
        border-bottom: 1px solid var(--line-l05);
        text-align: left;
        vertical-align: top;
        font-size: 13px;
        line-height: 21px;
      }
      .evidence-table th {
        color: var(--text-n5);
        font-weight: 400;
        white-space: nowrap;
      }
      .evidence-table tr:last-child td {
        border-bottom: 0;
      }
      .evidence-symbol {
        font-size: 14px;
        line-height: 22px;
        color: var(--text-n9);
      }
      .evidence-note {
        margin-top: var(--spacing-xxs);
        color: var(--text-n7);
      }
      .evidence-missing {
        margin-top: var(--spacing-xs);
        color: var(--text-n5);
      }
      .event-link {
        color: var(--main-m1);
        text-decoration: none;
      }
      .event-link:hover {
        text-decoration: underline;
      }
      .capability-list {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: var(--spacing-s);
      }
      .ticker-controls {
        margin-top: var(--spacing-s);
      }
      .error-box {
        display: none;
        margin-bottom: var(--spacing-m);
        padding: var(--spacing-m);
        border-radius: var(--radius-ct-s);
        background: var(--grey-g01);
        color: var(--main-m4);
        font-size: 13px;
        line-height: 21px;
      }
      @media (max-width: 980px) {
        .playbook-container {
          padding: var(--spacing-s) var(--spacing-l) var(--spacing-xxxl);
        }
        .status-strip {
          display: none;
        }
        .grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: var(--spacing-l);
        }
        .col-3,
        .col-4,
        .col-6,
        .col-8,
        .col-12 {
          grid-column: span 4;
        }
        .visual-stage {
          display: block;
        }
        .attention-title {
          font-size: 46px;
          line-height: 48px;
        }
        .attention-summary {
          font-size: 18px;
          line-height: 26px;
        }
        .intro-strip {
          grid-template-columns: 1fr;
          display: grid;
          gap: var(--spacing-m);
        }
        .answer-list,
        .focus-list {
          grid-template-columns: 1fr;
        }
        .chart-toolbar {
          display: grid;
          grid-template-columns: 1fr;
          justify-content: flex-start;
        }
        .control-group,
        .segmented {
          flex-wrap: wrap;
        }
        .control-group {
          width: 100%;
        }
        .segmented {
          max-width: 100%;
        }
        .segment {
          min-width: 0;
        }
        .benchmark-group {
          margin-left: 0;
        }
        .trend-chart-container {
          height: 360px;
        }
        .chart-shell {
          min-height: 380px;
        }
        .signal-list,
        .detail-grid {
          grid-template-columns: 1fr;
        }
        .notification-title {
          align-items: flex-start;
        }
        .evidence-pair,
        .capability-list {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 520px) {
        .playbook-container {
          padding: var(--spacing-s) var(--spacing-s) var(--spacing-xxxl);
        }
        .attention-card {
          padding: var(--spacing-m);
        }
        .answer-row {
          padding: var(--spacing-s);
        }
        .control-group {
          align-items: flex-start;
          flex-direction: column;
        }
        .segmented,
        .control-row {
          width: 100%;
        }
        .segmented {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(68px, 1fr));
        }
        .segment {
          flex: 1 1 64px;
          padding: 0 var(--spacing-s);
        }
        .checkbox-pill {
          flex: 1 1 88px;
          justify-content: center;
        }
        .chart-toolbar {
          overflow: hidden;
        }
      }
    </style>
  </head>
  <body>
    <main class="playbook-container">
      <div class="status-strip" id="statusStrip">
        <span class="pill">Loading feed data</span>
      </div>
      <div class="error-box" id="errorBox"></div>

      <section class="intro-strip" aria-label="Playbook description">
        <div class="intro-copy">
          <div class="intro-kicker">Portfolio Watch</div>
          <h2 class="intro-title">这个 Playbook 是用来判断今天有没有值得你查看的持仓变化。</h2>
          <p class="intro-text" id="playbookIntro">
            它监控价格变化、成交量、趋势、波动率、组合影响，以及相对 SPY/QQQ 的表现。
          </p>
        </div>
        <span class="pill" id="attentionUpdated">更新 --</span>
      </section>

      <section class="visual-stage" aria-label="Anything big">
        <div class="attention-card">
          <div class="attention-header">
            <div>
              <h1 class="attention-title">Anything big?</h1>
              <div class="attention-summary" id="overallStatus">...</div>
              <div class="attention-lede" id="attentionWhy">...</div>
              <div class="narrative-source" id="narrativeSource"></div>
            </div>
          </div>

          <div class="answer-list" id="todayAnswers"></div>

        </div>
      </section>

      <section class="chart-panel" aria-label="Portfolio trend">
        <div class="section-title">
          <span class="section-title-text">组合 vs 市场</span>
          <span class="section-meta" id="chartRead">Portfolio, SPY, QQQ</span>
        </div>
        <div class="chart-toolbar" aria-label="Trend chart controls">
          <div class="control-group">
            <span class="control-label">View</span>
            <div class="segmented" id="modeTabs" aria-label="Chart mode"></div>
          </div>
          <div class="control-group">
            <span class="control-label">Range</span>
            <div class="segmented" id="rangeTabs" aria-label="Chart range"></div>
          </div>
          <div class="control-group benchmark-group">
            <span class="control-label">Benchmark</span>
            <div class="control-row" id="benchmarkControls" aria-label="Benchmark controls"></div>
          </div>
        </div>
        <div class="chart-shell">
          <div id="trendChart" class="trend-chart-container"></div>
        </div>
        <div class="ticker-controls">
          <div class="chip-row" id="tickerControls" aria-label="Ticker controls"></div>
        </div>
      </section>

      <section class="grid" aria-label="Portfolio watch details">
        <div class="panel col-12">
          <div class="section-title"><span class="section-title-text">证据明细</span></div>
          <div id="signalDetails"></div>
        </div>

        <div class="panel col-6 is-narrow">
          <div class="section-title notification-title">
            <span class="section-title-text">通知状态</span>
            <button class="btn btn-secondary btn-extra-small notification-check-button" id="notificationCheckButton" type="button">发个测试</button>
          </div>
          <div class="notification-helper" id="notificationCheckResult" hidden></div>
          <div class="detail-grid" id="alertHistory"></div>
        </div>

        <div class="panel col-6">
          <div class="section-title"><span class="section-title-text">监控范围</span></div>
          <div id="capabilityStatus"></div>
        </div>
      </section>
    </main>

    <script>
      const OWNER_USERNAME = "REPLACE_OWNER_USERNAME";
      const FEED_NAME = "REPLACE_FEED_NAME";
      const FEED_MAJOR = "v1";
      function feedPath(group, output, suffix) {
        return `/alva/home/${OWNER_USERNAME}/feeds/${FEED_NAME}/${FEED_MAJOR}/data/${group}/${output}/${suffix}`;
      }
      const PATHS = {
        summary: feedPath("portfolio", "summary", "@last/1"),
        assets: feedPath("watch", "assets", "@last/1"),
        chartSeries: feedPath("chart", "series", "@last/260"),
        signals: feedPath("signals", "events", "@last/1"),
        alerts: feedPath("alerts", "events", "@last/5"),
        decision: feedPath("alerts", "decision", "@last/40"),
        notify: feedPath("notify", "message", "@last/1"),
        narrative: feedPath("narrative", "brief", "@last/1"),
        capability: feedPath("capability", "status", "@last/1"),
        context: feedPath("context", "events", "@last/30"),
      };
      const PALETTE = ["#2f8f9d", "#d96b5f", "#5e72c8", "#78994e", "#b565a7", "#c48c3f", "#60798d"];
      const FONT = "'Delight', -apple-system, 'OPPO Sans 4.0', BlinkMacSystemFont, sans-serif";
      const MODES = [
        { key: "portfolio", label: "Portfolio" },
        { key: "tickers", label: "Tickers" },
        { key: "compare", label: "Compare" },
      ];
      const RANGES = [
        { key: "1m", label: "1M", months: 1 },
        { key: "3m", label: "3M", months: 3 },
        { key: "6m", label: "6M", months: 6 },
        { key: "all", label: "All", months: null },
      ];
      const state = {
        mode: "portfolio",
        range: "3m",
        benchmarks: new Set(),
        benchmarkDefaultsApplied: false,
        selectedTicker: "",
        comparedTickers: new Set(),
      };
      let trendChart = null;
      let allChartRows = [];
      let allAssets = [];
      let allSignals = [];
      let allContextEvents = [];

      function createAlvaClientConfig() {
        const params = new URLSearchParams(window.location.search);
        const pbsvToken = window.alva?.udf?.getViewerToken?.();
        const apiOrigin = params.get("api_origin");
        return {
          ...(pbsvToken ? { pbsvToken } : {}),
          ...(apiOrigin ? { baseUrl: apiOrigin.replace(/\/$/, "") } : {}),
        };
      }
      function createAlvaClient() {
        return new AlvaToolkit.AlvaClient(createAlvaClientConfig());
      }
      function setNotificationCheckResult(message, kind) {
        const result = document.getElementById("notificationCheckResult");
        if (!result) return;
        result.hidden = false;
        result.classList.remove("is-ok", "is-error");
        if (kind) result.classList.add(kind);
        result.textContent = message;
      }
      async function sendTestNotification() {
        if (!window.alva?.udf?.call) {
          throw new Error("请从 Alva 页面打开并登录后再试。");
        }
        const token = window.alva?.udf?.getViewerToken?.();
        if (!token) {
          throw new Error("没有拿到 Alva 页面授权，请从 alva.ai 的 Playbook 页面打开后再试。");
        }
        try {
          const response = await window.alva.udf.call("sendTestNotification", {});
          return response?.result || response;
        } catch (error) {
          const message = String(error?.message || "");
          if (message.includes("Network error while invoking UDF")) {
            throw new Error("Alva 没能调用测试函数。请确认是在 alva.ai 页面中打开、已登录后再试。");
          }
          throw error;
        }
      }
      function setupNotificationCheck() {
        const button = document.getElementById("notificationCheckButton");
        if (!button) return;
        button.onclick = async () => {
          button.disabled = true;
          button.textContent = "发送中";
          try {
            const result = await sendTestNotification();
            const message = result?.message || "测试通知已发出。";
            setNotificationCheckResult(message, "is-ok");
            try {
              await init();
            } catch (refreshError) {
              setNotificationCheckResult(message + " 页面历史暂未刷新，请稍后手动刷新。", "is-ok");
            }
          } catch (error) {
            setNotificationCheckResult("发送失败：" + (error?.message || "请稍后再试。"), "is-error");
          } finally {
            button.disabled = false;
            button.textContent = "发个测试";
          }
        };
      }
      async function readAlfsJson(path) {
        const value = await createAlvaClient().fs.read({ path });
        if (typeof value === "string") return JSON.parse(value);
        return value;
      }
      function flattenRows(rows) {
        if (!Array.isArray(rows)) return [];
        const out = [];
        rows.forEach((row) => {
          if (Array.isArray(row.items)) {
            row.items.forEach((item) => out.push({ ...item, date: item.date || row.date }));
          } else {
            out.push(row);
          }
        });
        return out;
      }
      function last(rows) {
        return rows.length ? rows[rows.length - 1] : null;
      }
      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      function colorFinancialMoves(value) {
        return escapeHtml(cleanNarrativeText(value))
          .replace(/(^|[^\w])(\+\d+(?:\.\d+)?%)/g, '$1<span class="is-up">$2</span>')
          .replace(/(^|[^\w])(-\d+(?:\.\d+)?%)/g, '$1<span class="is-down">$2</span>')
          .replace(/(涨\s*)(\d+(?:\.\d+)?%)/g, '$1<span class="is-up">$2</span>')
          .replace(/(跌\s*)(\d+(?:\.\d+)?%)/g, '$1<span class="is-down">$2</span>');
      }
      function cleanNarrativeText(value) {
        return String(value ?? "")
          .replace(/主要要看/g, "主要看")
          .replace(/关注线/g, "需要关注的变化")
          .replace(/打开看/g, "查看");
      }
      function clsFor(value) {
        if (typeof value !== "number") return "is-neutral";
        if (value > 0) return "is-up";
        if (value < 0) return "is-down";
        return "is-neutral";
      }
      function fmtNumber(value, digits) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "--";
        return value.toLocaleString("en-US", { minimumFractionDigits: digits, maximumFractionDigits: digits });
      }
      function fmtPct(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "--";
        return (value >= 0 ? "+" : "") + fmtNumber(value, 2) + "%";
      }
      function fmtRatio(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "--";
        return fmtNumber(value, 2) + "x";
      }
      function fmtImpact(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "--";
        return fmtNumber(Math.abs(value), 2) + "%";
      }
      function fmtMoney(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "--";
        if (Math.abs(value) >= 1e12) return "$" + fmtNumber(value / 1e12, 2) + "T";
        if (Math.abs(value) >= 1e9) return "$" + fmtNumber(value / 1e9, 1) + "B";
        if (Math.abs(value) >= 1e6) return "$" + fmtNumber(value / 1e6, 1) + "M";
        return "$" + fmtNumber(value, 0);
      }
      function fmtDate(value) {
        if (!value) return "--";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value).slice(0, 10);
        return date.toLocaleString("en-US", { hour12: false, month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit" });
      }
      function colorFor(row, index) {
        if (row.seriesType === "portfolio") return "#1f8f86";
        if (row.seriesType === "benchmark") return row.symbol === "SPY" ? "#6f747c" : "#9a7c40";
        return PALETTE[index % PALETTE.length];
      }
      function setMetric(id, value, className) {
        const el = document.getElementById(id);
        el.textContent = value;
        el.classList.remove("is-up", "is-down", "is-neutral");
        el.classList.add(className || "is-neutral");
      }
      function uniqueSymbols(rows, type) {
        return Array.from(new Set(rows.filter((row) => row.seriesType === type).map((row) => row.symbol))).sort();
      }
      function rowDateMs(row) {
        if (typeof row.date === "number" && Number.isFinite(row.date)) return row.date;
        const parsed = Date.parse(row.date);
        return Number.isFinite(parsed) ? parsed : null;
      }
      function selectedRangeStartMs() {
        const range = RANGES.find((item) => item.key === state.range);
        if (!range || range.months === null) return null;
        const dates = allChartRows.map(rowDateMs).filter((value) => value !== null);
        if (!dates.length) return null;
        const start = new Date(Math.max(...dates));
        start.setMonth(start.getMonth() - range.months);
        return start.getTime();
      }
      function assetOrder() {
        const byScore = {};
        allSignals.forEach((signal) => {
          byScore[signal.symbol] = Math.max(byScore[signal.symbol] || 0, signal.score || 0);
        });
        return allAssets.slice().sort((a, b) => {
          const scoreDiff = (byScore[b.symbol] || 0) - (byScore[a.symbol] || 0);
          if (scoreDiff) return scoreDiff;
          return (b.watchWeightPct || 0) - (a.watchWeightPct || 0);
        }).map((row) => row.symbol);
      }
      function rowsForSeries(seriesType, symbol) {
        const startMs = selectedRangeStartMs();
        return allChartRows
          .filter((row) => row.seriesType === seriesType && row.symbol === symbol && typeof row.normalized === "number")
          .filter((row) => {
            const dateMs = rowDateMs(row);
            return dateMs !== null && (startMs === null || dateMs >= startMs);
          })
          .sort((a, b) => rowDateMs(a) - rowDateMs(b));
      }
      function normalizedColor(value) {
        const color = String(value || "").toLowerCase();
        return color === "red" || color === "yellow" || color === "green" ? color : "";
      }
      function colorLabel(color) {
        if (color === "red") return "请立即关注";
        if (color === "yellow") return "留意一下";
        return "无需关注";
      }
      function colorBody(color) {
        if (color === "red") return "有重大变化，建议现在查看。";
        if (color === "yellow") return "有变化值得看看，但还不到需要立刻处理。";
        return "当前没有值得你查看的变化。";
      }
      function statusChip(color, label) {
        const safeColor = normalizedColor(color) || "green";
        return `<span class="status-chip ${escapeHtml(safeColor)}">${escapeHtml(label || colorLabel(safeColor))}</span>`;
      }
      function reviewColorForRow(row) {
        const explicit = normalizedColor(row.reviewColor || row.bigStatusColor);
        if (explicit) return explicit;
        if (row.severity === "high") return "red";
        if (row.severity === "medium") return "yellow";
        return "green";
      }
      function reviewPriorityForRow(row) {
        const color = reviewColorForRow(row);
        if (color === "red") return 3;
        if (color === "yellow") return 2;
        return 1;
      }
      function renderSummary(summary) {
        const benchmarkText = summary.benchmarks ? `基准 ${summary.benchmarks}` : "暂无基准曲线";
        document.getElementById("statusStrip").innerHTML =
          `<span class="pill">${escapeHtml(summary.universe || "")}</span>` +
          `<span class="pill">${escapeHtml(summary.weighting || "")}</span>` +
          `<span class="pill">${escapeHtml(benchmarkText)}</span>` +
          `<span class="pill">更新 ${escapeHtml(fmtDate(summary.asOf))}</span>` +
          (summary.missingBenchmarks ? `<span class="pill">缺失基准: ${escapeHtml(summary.missingBenchmarks)}</span>` : "");
        const universe = summary.universe || "这些持仓";
        document.getElementById("playbookIntro").textContent =
          `它监控 ${universe} 的价格变化、成交量、趋势、波动率、组合影响，以及相对 SPY/QQQ 的表现，用来判断今天有没有值得你查看的变化。`;
        document.getElementById("chartRead").innerHTML =
          `组合今日 <span class="${clsFor(summary.return1d)}">${escapeHtml(fmtPct(summary.return1d))}</span> / ${escapeHtml(benchmarkText)}`;
      }
      function attentionStatusModel(summary, decision, signals) {
        const explicit = normalizedColor(decision.bigStatusColor || summary.bigStatusColor);
        if (explicit) {
          return {
            color: explicit,
            label: decision.bigStatusLabel || summary.bigStatusLabel || colorLabel(explicit),
            subtitle: decision.bigStatusBody || summary.bigStatusBody || colorBody(explicit),
          };
        }
        const state = String(decision.notificationState || "quiet");
        const highCount = summary.highSignalCount || signals.filter((row) => row.severity === "high").length;
        const attentionCount = summary.attentionCount || signals.filter((row) => row.severity === "high" || row.severity === "medium").length;
        if (state === "sent" || highCount > 0 || summary.riskState === "Alert") {
          return {
            color: "red",
            label: colorLabel("red"),
            subtitle: colorBody("red"),
          };
        }
        if (state === "watch" || attentionCount > 0 || summary.riskState === "Watch") {
          return {
            color: "yellow",
            label: colorLabel("yellow"),
            subtitle: colorBody("yellow"),
          };
        }
        return {
          color: "green",
          label: colorLabel("green"),
          subtitle: colorBody("green"),
        };
      }
      function answerForAsset(asset, signal) {
        const row = signal || asset || {};
        const color = reviewColorForRow(row);
        return { label: row.reviewLabel || colorLabel(color), color };
      }
      function buildNextWatch(summary, decision, signals) {
        if (decision.nextTrigger) return decision.nextTrigger;
        const top = signals.slice().sort((a, b) => (b.score || 0) - (a.score || 0))[0];
        if (top && reviewColorForRow(top) !== "green") {
          return `${top.symbol} 的变化继续扩大，组合影响升高，或多只持仓同时异常。`;
        }
        return "价格、成交量、趋势、波动率或组合影响出现更明显变化。";
      }
      function signalBySymbolMap(signals) {
        const bySymbol = {};
        signals.forEach((signal) => {
          if (!bySymbol[signal.symbol] || (signal.score || 0) > (bySymbol[signal.symbol].score || 0)) {
            bySymbol[signal.symbol] = signal;
          }
        });
        return bySymbol;
      }
      function portfolioImpactFor(asset, signal) {
        if (signal && typeof signal.portfolioImpactPct === "number") return signal.portfolioImpactPct;
        if (asset && typeof asset.portfolioImpactPct === "number") return asset.portfolioImpactPct;
        if (asset && typeof asset.return1d === "number" && typeof asset.watchWeightPct === "number") {
          return Math.abs(asset.return1d) * asset.watchWeightPct / 100;
        }
        return null;
      }
      function holdingEvidence(asset, signal) {
        const row = asset || signal || {};
        const impact = portfolioImpactFor(asset, signal);
        const relText = typeof row.relativeReturn1d === "number" ? `，相对 SPY ${fmtPct(row.relativeReturn1d)}` : "";
        return `${row.symbol || "--"} 今日 ${fmtPct(row.return1d)}${relText}，成交量 ${fmtRatio(row.volumeRatio20d)}，组合影响 ${fmtImpact(impact)}。`;
      }
      function holdingEvidenceHtml(asset, signal) {
        const row = asset || signal || {};
        const impact = portfolioImpactFor(asset, signal);
        const rel = typeof row.relativeReturn1d === "number"
          ? `，相对 SPY <span class="${clsFor(row.relativeReturn1d)}">${escapeHtml(fmtPct(row.relativeReturn1d))}</span>`
          : "";
        return `${escapeHtml(row.symbol || "--")} 今日 <span class="${clsFor(row.return1d)}">${escapeHtml(fmtPct(row.return1d))}</span>${rel}，成交量 ${escapeHtml(fmtRatio(row.volumeRatio20d))}，组合影响 ${escapeHtml(fmtImpact(impact))}。`;
      }
      function contextStateText(value) {
        const map = {
          matched_event: "有事件匹配",
          near_earnings: "临近财报",
          price_only: "未匹配事件",
          context_unavailable: "事件源不可用",
        };
        return map[value] || value || "未匹配事件";
      }
      function contextEventsForSymbol(symbol) {
        return allContextEvents
          .filter((row) => row.symbol === symbol)
          .sort((a, b) => (Date.parse(b.publishedAt || b.eventDate || b.asOf || 0) || 0) - (Date.parse(a.publishedAt || a.eventDate || a.asOf || 0) || 0));
      }
      function contextLine(row) {
        if (!row) return "暂未匹配到新闻、财报日期或分析师变化。";
        if (row.contextSummary) return row.contextSummary;
        const event = contextEventsForSymbol(row.symbol)[0];
        if (event) return `匹配到 ${event.source || "事件"}：${event.title}`;
        return "暂未匹配到新闻、财报日期或分析师变化。";
      }
      function topEventForRow(row) {
        return row.topEventTitle ? {
          title: row.topEventTitle,
          source: row.topEventSource,
          url: row.topEventUrl,
          when: row.topEventAt,
          type: row.topEventType,
        } : contextEventsForSymbol(row.symbol)[0];
      }
      function eventEvidenceHtml(row) {
        const event = topEventForRow(row);
        if (!event || !event.title) {
          return `<div class="evidence-note">${escapeHtml(contextLine(row))}</div>`;
        }
        const title = escapeHtml(event.title);
        const titleHtml = event.url
          ? `<a class="event-link" href="${escapeHtml(event.url)}" target="_blank" rel="noopener noreferrer">${title}</a>`
          : title;
        const meta = [event.source, event.type || event.eventType, fmtDate(event.when || event.publishedAt || event.eventDate)].filter(Boolean).join(" / ");
        return `<div>${titleHtml}</div><div class="evidence-note">${escapeHtml(meta)}</div>`;
      }
      function answerContextHtml(row) {
        const status = contextStateText(row && row.contextState);
        const event = topEventForRow(row || {});
        if (event && event.title) {
          const title = escapeHtml(event.title);
          const titleHtml = event.url
            ? `<a class="event-link" href="${escapeHtml(event.url)}" target="_blank" rel="noopener noreferrer">${title}</a>`
            : title;
          const prefix = event.source ? `${escapeHtml(event.source)}：` : "";
          return `<span class="evidence-label">${escapeHtml(status)}</span><br>${prefix}${titleHtml}`;
        }
        return `<span class="evidence-label">${escapeHtml(status)}</span><br>${escapeHtml(contextLine(row))}`;
      }
      function portfolioRead(summary, assets, signals, color) {
        const active = signals.filter((row) => reviewColorForRow(row) !== "green");
        const red = active.filter((row) => reviewColorForRow(row) === "red");
        const yellow = active.filter((row) => reviewColorForRow(row) === "yellow");
        const portfolioMove = `组合今日 ${fmtPct(summary.return1d)}`;
        if (red.length) {
          return `${portfolioMove}。${red.map((row) => row.symbol).join("、")} 已达到请立即关注级别。`;
        }
        if (yellow.length) {
          return `${portfolioMove}。${yellow.map((row) => row.symbol).join("、")} 有变化值得留意，但还没有达到立即关注级别。`;
        }
        return `${portfolioMove}。当前没有持仓达到需要关注的变化。`;
      }
      function miniMetric(label, value, className) {
        return `<div class="mini-metric"><div class="mini-label">${escapeHtml(label)}</div><div class="mini-value ${className || ""}">${escapeHtml(value)}</div></div>`;
      }
      function evidenceMissingHtml(row) {
        const text = row && row.evidenceMissing ? String(row.evidenceMissing).trim() : "";
        return text ? `<div class="evidence-missing">${escapeHtml(text)}</div>` : "";
      }
      function renderAttentionStatus(summary, decision, assets, signals, narrative) {
        const model = attentionStatusModel(summary, decision, signals);
        const narrativeSummary = narrative && narrative.summary ? narrative.summary : portfolioRead(summary, assets, signals, model.color);
        const narrativeLimit = narrative && narrative.limitations
          ? narrative.limitations
          : "基于已接入的价格、成交量、趋势、波动率、组合影响和 SPY/QQQ 对比整理。";
        document.getElementById("overallStatus").innerHTML = colorFinancialMoves(narrativeSummary);
        document.getElementById("attentionWhy").textContent = narrativeLimit;
        document.getElementById("narrativeSource").textContent =
          narrative && narrative.modelStatus === "generated" ? "模型根据已接入数据整理" : "根据已接入数据整理";
        document.getElementById("attentionUpdated").textContent = "更新 " + fmtDate(summary.asOf || decision.asOf);

        const signalBySymbol = signalBySymbolMap(signals);
        document.getElementById("todayAnswers").innerHTML = assets.map((asset) => {
          const signal = signalBySymbol[asset.symbol];
          const answer = answerForAsset(asset, signal);
          const color = reviewColorForRow(signal || asset);
          const impact = portfolioImpactFor(asset, signal);
          return `<article class="answer-row ${escapeHtml(color)}">` +
            `<div class="answer-top"><div class="answer-symbol">${escapeHtml(asset.symbol)}</div>${statusChip(answer.color, answer.label)}</div>` +
            `<div class="answer-detail">${holdingEvidenceHtml(asset, signal)}</div>` +
            `<div class="answer-context">${answerContextHtml(signal || asset)}</div>` +
            `<div class="mini-metrics">` +
            miniMetric("1D", fmtPct(asset.return1d), clsFor(asset.return1d)) +
            miniMetric("相对 SPY", fmtPct(asset.relativeReturn1d), clsFor(asset.relativeReturn1d)) +
            miniMetric("成交量", fmtRatio(asset.volumeRatio20d)) +
            miniMetric("组合影响", fmtImpact(impact)) +
            `</div>` +
            `</article>`;
        }).join("");
      }
      function renderModeTabs() {
        document.getElementById("modeTabs").innerHTML = MODES.map((mode) =>
          `<button class="btn segment ${state.mode === mode.key ? "is-active" : ""}" type="button" data-mode="${mode.key}">${mode.label}</button>`
        ).join("");
        document.querySelectorAll("[data-mode]").forEach((button) => {
          button.onclick = () => {
            state.mode = button.dataset.mode;
            renderControlsAndChart();
          };
        });
      }
      function renderRangeControls() {
        document.getElementById("rangeTabs").innerHTML = RANGES.map((range) =>
          `<button class="btn segment ${state.range === range.key ? "is-active" : ""}" type="button" data-range="${range.key}">${range.label}</button>`
        ).join("");
        document.querySelectorAll("[data-range]").forEach((button) => {
          button.onclick = () => {
            state.range = button.dataset.range;
            renderControlsAndChart();
          };
        });
      }
      function renderBenchmarkControls() {
        const available = uniqueSymbols(allChartRows, "benchmark");
        if (!state.benchmarkDefaultsApplied) {
          available.forEach((symbol) => state.benchmarks.add(symbol));
          state.benchmarkDefaultsApplied = true;
        }
        document.getElementById("benchmarkControls").innerHTML = available.map((symbol) =>
          `<label class="checkbox-pill ${state.benchmarks.has(symbol) ? "is-active" : ""}"><input type="checkbox" data-benchmark="${escapeHtml(symbol)}" ${state.benchmarks.has(symbol) ? "checked" : ""}>${escapeHtml(symbol)}</label>`
        ).join("");
        document.querySelectorAll("[data-benchmark]").forEach((input) => {
          input.onchange = () => {
            if (input.checked) state.benchmarks.add(input.dataset.benchmark);
            else state.benchmarks.delete(input.dataset.benchmark);
            renderControlsAndChart();
          };
        });
      }
      function ensureTickerDefaults() {
        const ordered = assetOrder();
        if (!state.selectedTicker || ordered.indexOf(state.selectedTicker) === -1) {
          state.selectedTicker = ordered[0] || "";
        }
        if (!state.comparedTickers.size) {
          ordered.slice(0, 5).forEach((symbol) => state.comparedTickers.add(symbol));
        }
      }
      function renderTickerControls() {
        ensureTickerDefaults();
        const ordered = assetOrder();
        const show = state.mode !== "portfolio";
        const el = document.getElementById("tickerControls");
        if (!show) {
          el.innerHTML = "";
          return;
        }
        el.innerHTML = ordered.map((symbol) => {
          if (state.mode === "tickers") {
            return `<label class="checkbox-pill ${state.selectedTicker === symbol ? "is-active" : ""}"><input type="radio" name="ticker-single" data-ticker-single="${escapeHtml(symbol)}" ${state.selectedTicker === symbol ? "checked" : ""}>${escapeHtml(symbol)}</label>`;
          }
          return `<label class="checkbox-pill ${state.comparedTickers.has(symbol) ? "is-active" : ""}"><input type="checkbox" data-ticker-compare="${escapeHtml(symbol)}" ${state.comparedTickers.has(symbol) ? "checked" : ""}>${escapeHtml(symbol)}</label>`;
        }).join("");
        document.querySelectorAll("[data-ticker-single]").forEach((button) => {
          button.onchange = () => {
            state.selectedTicker = button.dataset.tickerSingle;
            renderControlsAndChart();
          };
        });
        document.querySelectorAll("[data-ticker-compare]").forEach((button) => {
          button.onchange = () => {
            const symbol = button.dataset.tickerCompare;
            if (button.checked) state.comparedTickers.add(symbol);
            else state.comparedTickers.delete(symbol);
            if (!state.comparedTickers.size) state.comparedTickers.add(symbol);
            renderControlsAndChart();
          };
        });
      }
      function selectedSeries() {
        const out = [];
        if (state.mode === "portfolio") {
          out.push({ seriesType: "portfolio", symbol: "PORTFOLIO" });
        } else if (state.mode === "tickers" && state.selectedTicker) {
          out.push({ seriesType: "holding", symbol: state.selectedTicker });
        } else if (state.mode === "compare") {
          Array.from(state.comparedTickers).slice(0, 8).forEach((symbol) => out.push({ seriesType: "holding", symbol }));
        }
        Array.from(state.benchmarks).forEach((symbol) => out.push({ seriesType: "benchmark", symbol }));
        return out;
      }
      const AX = {
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { fontSize: 10, color: "rgba(0,0,0,0.68)", fontFamily: FONT, margin: 8 },
        splitLine: { lineStyle: { color: "rgba(0,0,0,0.05)" } },
      };
      const TT = {
        trigger: "axis",
        backgroundColor: "rgba(255,255,255,0.96)",
        borderColor: "rgba(0,0,0,0.08)",
        borderWidth: 1,
        borderRadius: 6,
        padding: 12,
        textStyle: { fontFamily: FONT, fontSize: 12, fontWeight: 400, color: "rgba(0,0,0,0.9)" },
        axisPointer: { type: "line", lineStyle: { color: "rgba(0,0,0,0.12)", width: 1 } },
        extraCssText: "box-shadow:none;",
      };
      function renderTrendChart() {
        const chartEl = document.getElementById("trendChart");
        if (!trendChart) trendChart = echarts.init(chartEl);
        const picked = selectedSeries();
        const series = picked.map((item, index) => {
          const rows = rowsForSeries(item.seriesType, item.symbol);
          const first = rows[0] || item;
          const base = rows.find((row) => typeof row.normalized === "number" && Number.isFinite(row.normalized))?.normalized;
          return {
            name: first.label || item.symbol,
            type: "line",
            data: rows.map((row) => {
              const value = base ? (row.normalized / base) * 100 : row.normalized;
              return [rowDateMs(row), value];
            }),
            showSymbol: false,
            smooth: false,
            lineStyle: {
              width: item.seriesType === "portfolio" ? 2 : 1.25,
              color: colorFor(item, index),
              type: item.seriesType === "benchmark" ? "dashed" : "solid",
            },
            itemStyle: { color: colorFor(item, index) },
          };
        }).filter((item) => item.data.length);
        trendChart.setOption({
          animation: false,
          color: series.map((item) => item.itemStyle.color),
          grid: { top: 12, right: 18, bottom: 26, left: 36, containLabel: true },
          tooltip: TT,
          legend: {
            top: 0,
            right: 0,
            textStyle: { fontSize: 11, color: "rgba(0,0,0,0.72)", fontFamily: FONT },
          },
          xAxis: { type: "time", boundaryGap: false, ...AX },
          yAxis: { type: "value", scale: true, ...AX },
          series,
        }, true);
        requestAnimationFrame(() => trendChart.resize());
      }
      function renderControlsAndChart() {
        renderModeTabs();
        renderRangeControls();
        renderBenchmarkControls();
        renderTickerControls();
        renderTrendChart();
      }
      function signalIntent(row) {
        const color = reviewColorForRow(row);
        if (color === "red") return "建议现在查看";
        if (color === "yellow") return "今天有空可以看一眼";
        return "无需关注";
      }
      function stateText(value) {
        if (!value) return "--";
        const map = {
          "abnormal up": "异常上涨",
          "abnormal down": "异常下跌",
          "weak": "偏弱",
          "firm": "偏强",
          "normal": "正常",
          "volume spike": "明显放量",
          "volume elevated": "成交量偏高",
          "normal volume": "成交量正常",
          "volume unknown": "成交量未知",
          "price": "价格",
          "volume": "成交量",
          "trend": "趋势",
          "volatility": "波动率",
          "trend firm": "趋势偏强",
          "trend weak": "趋势偏弱",
          "trend stable": "趋势稳定",
          "trend unknown": "趋势未知",
          "stretched": "走势拉伸",
          "volatility expanded": "波动扩大",
          "volatility elevated": "波动偏高",
          "normal volatility": "波动正常",
          "volatility unknown": "波动未知",
        };
        return map[value] || value;
      }
      function techChips(row) {
        const chips = [
          ["价格", stateText(row.priceState)],
          ["成交量", stateText(row.volumeState)],
          ["趋势", stateText(row.trendState)],
          ["波动", stateText(row.volatilityState)],
        ];
        return `<div class="tech-chip-row">` + chips.map(([label, value]) =>
          `<span class="tech-chip"><span class="tech-chip-label">${escapeHtml(label)}</span>${escapeHtml(value || "--")}</span>`
        ).join("") + `</div>`;
      }
      function renderSignals(signals) {
        const detailRows = signals.slice().sort((a, b) => {
          const priorityDiff = reviewPriorityForRow(b) - reviewPriorityForRow(a);
          if (priorityDiff) return priorityDiff;
          return (b.score || 0) - (a.score || 0);
        }).slice(0, 6);
        if (!detailRows.length) {
          document.getElementById("signalDetails").innerHTML =
            `<div class="empty-block"><div class="signal-title">暂无证据明细</div><div class="detail-text">当前没有可展示的信号。</div></div>`;
          return;
        }
        document.getElementById("signalDetails").innerHTML =
          `<div class="evidence-table-wrap"><table class="evidence-table">` +
          `<thead><tr><th>持仓</th><th>状态</th><th>今日</th><th>相对 SPY</th><th>成交量</th><th>组合影响</th><th>事件证据</th><th>价格证据</th></tr></thead><tbody>` +
          detailRows.map((row) => {
          const anchor = row.deepLinkAnchor || `signal-${row.signalId}`;
          const color = reviewColorForRow(row);
          const asset = allAssets.find((item) => item.symbol === row.symbol) || {};
          return `<tr id="${escapeHtml(anchor)}">` +
            `<td><div class="evidence-symbol">${escapeHtml(row.symbol)}</div><div class="evidence-label">${escapeHtml(fmtDate(row.asOf))}</div></td>` +
            `<td>${statusChip(color, row.reviewLabel || colorLabel(color))}<div class="evidence-note">${escapeHtml(signalIntent(row))}</div></td>` +
            `<td class="${clsFor(asset.return1d)}">${escapeHtml(fmtPct(asset.return1d))}</td>` +
            `<td class="${clsFor(asset.relativeReturn1d)}">${escapeHtml(fmtPct(asset.relativeReturn1d))}</td>` +
            `<td>${escapeHtml(fmtRatio(asset.volumeRatio20d))}</td>` +
            `<td>${escapeHtml(fmtImpact(row.portfolioImpactPct))}</td>` +
            `<td>${eventEvidenceHtml(row)}<div class="evidence-note">${escapeHtml(contextStateText(row.contextState))}</div></td>` +
            `<td><div>${colorFinancialMoves(holdingEvidence(asset, row))}</div>` +
            techChips(row) +
            `<div class="evidence-note">${colorFinancialMoves(row.technicalSummary || row.confirmationStatus || "")}</div>` +
            evidenceMissingHtml(row) + `</td>` +
            `</tr>`;
        }).join("") + `</tbody></table></div>`;
      }
      function notificationTypeLabel(state) {
        if (state === "sent") return "正式通知";
        if (state === "test") return "测试通知";
        if (state === "setup") return "设置确认";
        return "未发送";
      }
      function notificationCurrentTitle(state) {
        if (state === "sent") return "正式通知已发出";
        if (state === "setup") return "设置确认已发出";
        if (state === "test") return "测试通知已发出";
        if (state === "watch") return "这次不发通知";
        return "这次不用通知";
      }
      function notificationRule(state) {
        if (state === "test") {
          return "这是一条手动测试通知，用来验证通知通路；它不是市场信号，也不代表需要操作。";
        }
        if (state === "setup") {
          return "这是一条设置确认，用来证明通知链路可用；它不是市场信号。";
        }
        return "规则：绿色和黄色只在页面展示；只有红色“请立即关注”才会发通知。外部消息是否送达，取决于你的 Alva 通知渠道。";
      }
      function sentNotificationRows(decisions) {
        return decisions
          .filter((row) => ["sent", "test", "setup"].includes(String(row.notificationState || "")))
          .sort((a, b) => (rowDateMs(b) || 0) - (rowDateMs(a) || 0))
          .slice(0, 5);
      }
      function renderNotificationHistory(decisions) {
        const rows = sentNotificationRows(decisions || []);
        if (!rows.length) {
          return `<div class="notification-history-title">最近发出的通知</div>` +
            `<div class="notification-empty">最近没有发出正式通知或测试通知。</div>`;
        }
        return `<div class="notification-history-title">最近发出的通知</div>` +
          `<div class="notification-history-list">` +
          rows.map((row) => {
            const state = String(row.notificationState || "");
            const color = state === "sent" ? "red" : state === "setup" ? "green" : "yellow";
            const chipLabel = state === "sent" ? row.bigStatusLabel || "请立即关注" : notificationTypeLabel(state);
            return `<article class="notification-history-item">` +
              `<div class="notification-history-top">` +
              `<span class="notification-type">${escapeHtml(notificationTypeLabel(state))}</span>` +
              `<span class="notification-time">${escapeHtml(fmtDate(row.date || row.asOf))}</span>` +
              `</div>` +
              `<div class="signal-top"><span class="signal-symbol">${escapeHtml(row.topSymbol || "PORTFOLIO")}</span>${statusChip(color, chipLabel)}</div>` +
              `<div class="detail-text">${colorFinancialMoves(row.notificationAudit || row.decisionBody || "")}</div>` +
              `</article>`;
          }).join("") + `</div>`;
      }
      function renderAlerts(alerts, decision, decisions) {
        if (decision && decision.notificationAudit) {
          const color = normalizedColor(decision.bigStatusColor) || "green";
          const state = String(decision.notificationState || "quiet");
          document.getElementById("alertHistory").innerHTML =
            `<article class="alert-card notification-current">` +
            `<div class="signal-top"><span class="signal-symbol">当前状态</span>${statusChip(color, decision.bigStatusLabel || "无需关注")}</div>` +
            `<div class="signal-title">${escapeHtml(notificationCurrentTitle(state))}</div>` +
            `<div class="detail-text">${colorFinancialMoves(decision.notificationAudit || "")}</div>` +
            `<div class="metric-caption">当前等级：${escapeHtml(decision.bigStatusLabel || "无需关注")} / 最近运行：${escapeHtml(fmtDate(decision.date || decision.asOf))}</div>` +
            `<div class="notification-rule metric-caption">${escapeHtml(notificationRule(state))}</div>` +
            `</article>` +
            renderNotificationHistory(decisions || [decision]);
          return;
        }
        const sorted = alerts.slice().sort((a, b) => (b.date || 0) - (a.date || 0)).slice(0, 4);
        const quietCount = sorted.filter((row) => row.deliveryState === "quiet" || row.severity === "quiet").length;
        const actionable = sorted.filter((row) => row.deliveryState !== "quiet" && row.severity !== "quiet");
        if (!actionable.length && quietCount) {
          document.getElementById("alertHistory").innerHTML =
            `<article class="alert-card">` +
            `<div class="signal-top"><span class="signal-symbol">PORTFOLIO</span>${statusChip("green", "无需关注")}</div>` +
            `<div class="signal-title">这次不用通知</div>` +
            `<div class="detail-text">最近 ${quietCount} 次运行没有达到请立即关注级别。</div>` +
            `<div class="notification-rule metric-caption">规则：绿色和黄色只在页面展示；只有红色“请立即关注”才会发通知。</div>` +
            `</article>`;
          return;
        }
        document.getElementById("alertHistory").innerHTML = actionable.map((row) =>
          `<article class="alert-card">` +
          `<div class="signal-top"><span class="signal-symbol">${escapeHtml(row.symbol)}</span>${statusChip(row.severity === "high" ? "red" : "yellow", row.severity === "high" ? "请立即关注" : "留意一下")}</div>` +
          `<div class="signal-title">${escapeHtml(row.title)}</div>` +
          `<div class="detail-text">${escapeHtml(row.body)}</div>` +
          `<div class="metric-caption">触发项 ${escapeHtml(row.triggerType)} / ${escapeHtml(fmtDate(row.asOf))}</div>` +
          `</article>`
        ).join("");
      }
      function renderCapability(capability, summary) {
        const fallback = {
          checkedItems: "价格波动、成交量、趋势、波动率、组合影响、SPY/QQQ 对比",
          notCheckedItems: "新闻、财报日期、分析师变化、公司催化剂",
          decisionLimit: "本版本只用已接入的数据判断是否需要关注；不会把未接入或不可用的事件当成结论。",
        };
        const row = capability || fallback;
        const universe = summary && summary.universe ? summary.universe : "这些持仓";
        document.getElementById("playbookIntro").textContent =
          `它监控 ${universe} 的 ${row.checkedItems || fallback.checkedItems}，用来判断今天有没有值得你查看的变化。`;
        document.getElementById("capabilityStatus").innerHTML =
          `<div class="detail-card">` +
          `<div class="capability-list">` +
          `<div class="evidence-box"><div class="evidence-label">已接入</div><div class="detail-text">${escapeHtml(row.checkedItems || fallback.checkedItems)}</div></div>` +
          `<div class="evidence-box"><div class="evidence-label">暂未接入</div><div class="detail-text">${escapeHtml(row.notCheckedItems || fallback.notCheckedItems)}</div></div>` +
          `</div>` +
          `<div class="metric-caption">${escapeHtml(row.decisionLimit || fallback.decisionLimit)}</div>` +
          `</div>`;
      }
      async function init() {
        const [summaryRaw, assetRaw, chartRaw, signalRaw, alertRaw, decisionRaw, narrativeRaw, capabilityRaw, contextRaw] = await Promise.all([
          readAlfsJson(PATHS.summary),
          readAlfsJson(PATHS.assets),
          readAlfsJson(PATHS.chartSeries),
          readAlfsJson(PATHS.signals),
          readAlfsJson(PATHS.alerts),
          readAlfsJson(PATHS.decision),
          readAlfsJson(PATHS.narrative).catch(() => []),
          readAlfsJson(PATHS.capability).catch(() => []),
          readAlfsJson(PATHS.context).catch(() => []),
        ]);
        const summary = last(flattenRows(summaryRaw));
        allAssets = flattenRows(assetRaw);
        allChartRows = flattenRows(chartRaw);
        allSignals = flattenRows(signalRaw);
        allContextEvents = flattenRows(contextRaw);
        const alerts = flattenRows(alertRaw);
        const decisionRows = flattenRows(decisionRaw);
        const decision = last(decisionRows);
        const narrative = last(flattenRows(narrativeRaw));
        if (!summary || !allAssets.length || !allChartRows.length) {
          throw new Error("Feed output is empty");
        }
        if (!decision) {
          throw new Error("Alert decision output is empty");
        }
        renderSummary(summary);
        renderAttentionStatus(summary, decision, allAssets, allSignals, narrative);
        renderSignals(allSignals);
        renderAlerts(alerts, decision, decisionRows);
        renderCapability(last(flattenRows(capabilityRaw)), summary);
        renderControlsAndChart();
        if (window.location.hash) {
          requestAnimationFrame(() => {
            const target = document.querySelector(window.location.hash);
            if (target) target.scrollIntoView({ block: "start" });
          });
        }
      }
      window.addEventListener("resize", () => {
        requestAnimationFrame(() => {
          if (trendChart) trendChart.resize();
        });
      });
      setupNotificationCheck();
      init().catch((error) => {
        const box = document.getElementById("errorBox");
        box.style.display = "block";
        box.textContent = "Data read failed: " + error.message;
        document.getElementById("statusStrip").innerHTML = '<span class="pill">Read failed</span>';
      });
    </script>
  </body>
</html>
